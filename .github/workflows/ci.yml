name: KRAVIA CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend

      - name: Typecheck
        run: npm run typecheck

      - name: Backend tests
        run: npm test

      - name: Route, UI, API security, and CSRF contracts
        run: npm run test:e2e

      - name: Phase tracker
        run: npm run phase:status

      - name: Build
        run: npm run build
